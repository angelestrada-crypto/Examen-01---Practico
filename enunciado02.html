<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto con Estilo</title>
<link rel="stylesheet" href="css/estilo02.css">
</head>
<body>
  <div class="principal">
    <h2>Contacto</h2>
    <form method="POST" action="mailto:ejemplo@email.com">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Nombre completo">

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="ejemplo@email.com">

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" name="mensaje" placeholder="Danos tu mensaje"></textarea>

      <button type="submit" class="btn-enviar">Enviar</button>
    </form>
  </div>
</body>
</html>
